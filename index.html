<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人博客</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    background-image: radial-gradient(at 20% 0%, rgba(102,126,234,.08) 0, transparent 50%),
                      radial-gradient(at 80% 100%, rgba(118,75,162,.08) 0, transparent 50%);
    color: #2c3e50;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 48px 24px 0;
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #0f172a;
    cursor: default;
    user-select: none;
  }
  header .subtitle {
    font-size: 0.9rem;
    color: #94a3b8;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-top: 12px;
  }
  .divider {
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 3px;
    margin: 28px auto 0;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .notice {
    text-align: center;
    padding: 48px 40px 40px;
    border-radius: 24px;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    max-width: 460px;
    width: 100%;
    border: 1px solid rgba(0,0,0,.04);
  }
  .notice-icon {
    width: 56px; height: 56px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f0f0ff, #e8e0f4);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .notice-icon::before {
    content: '';
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2.5px solid #8b7ec8;
    opacity: .7;
  }
  .notice-icon::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #667eea;
    top: 12px; left: 12px;
    opacity: .5;
  }
  .notice h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: #1e293b;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }
  .notice p {
    font-size: .88rem;
    color: #94a3b8;
    font-weight: 300;
    line-height: 1.7;
  }
  footer {
    width: 100%;
    text-align: center;
    padding: 18px 16px;
    background: #fff;
    border-top: 1px solid rgba(0,0,0,.05);
    position: sticky;
    bottom: 0;
  }
  footer p { font-size: 0.82rem; color: #64748b; line-height: 1.8; }
  footer a { color: #6366f1; text-decoration: none; font-weight: 500; transition: color .2s; }
  footer a:hover { color: #764ba2; }
  @media (max-width: 480px) {
    header { padding: 36px 20px 0; }
    header h1 { font-size: 1.6rem; }
    header .subtitle { font-size: 0.82rem; }
    .divider { width: 32px; margin-top: 18px; }
    main { padding: 24px 16px; }
    .notice { padding: 32px 24px 28px; border-radius: 20px; }
    .notice-icon { width: 44px; height: 44px; margin-bottom: 18px; }
    .notice-icon::before { width: 20px; height: 20px; }
    .notice-icon::after { width: 7px; height: 7px; top: 10px; left: 10px; }
    .notice h2 { font-size: 1.05rem; }
    .notice p { font-size: .82rem; }
  }
  /* 编辑面板 */
  #edit-panel {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,.12);
    padding: 28px 24px 22px;
    z-index: 9999;
    width: 340px;
    max-width: 90vw;
  }
  #edit-panel h3 { font-size: .9rem; font-weight: 600; margin-bottom: 6px; color: #1e293b; }
  #edit-panel .hint { font-size: .75rem; color: #94a3b8; margin-bottom: 12px; line-height: 1.5; }
  #edit-panel input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: .85rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  #edit-panel input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
  #edit-panel .btns { margin-top: 16px; display: flex; justify-content: flex-end; gap: 8px; }
  #edit-panel button {
    padding: 8px 20px;
    border: none;
    border-radius: 10px;
    font-size: .82rem;
    cursor: pointer;
    transition: all .2s;
  }
  #edit-panel .cancel { background: #f1f5f9; color: #64748b; }
  #edit-panel .cancel:hover { background: #e2e8f0; }
  #edit-panel .save { background: #6366f1; color: #fff; }
  #edit-panel .save:hover { background: #4f46e5; }
  #edit-panel .save:disabled { opacity: .5; cursor: not-allowed; }
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.18);
    z-index: 9998;
  }
</style>
</head>
<body>
  <header>
    <h1 id="site-title">个人博客</h1>
    <p class="subtitle">记录生活，分享思考</p>
    <div class="divider"></div>
  </header>
  <main>
    <div class="notice">
      <div class="notice-icon"></div>
      <h2>网站建设中</h2>
      <p>内容正在筹备，敬请期待</p>
    </div>
  </main>
  <footer>
    <p>
      <a id="icp-link" href="https://beian.miit.gov.cn/" target="_blank" rel="nofollow noopener">京ICP备XXXXXXXX号-1</a>
    </p>
  </footer>
  <div id="overlay"></div>
  <div id="edit-panel">
    <h3>修改备案号</h3>
    <p class="hint">修改后所有设备立即生效，无需重启</p>
    <input id="icp-input" type="text" placeholder="例：京ICP备12345678号-1" />
    <div class="btns">
      <button class="cancel" id="btn-cancel">取消</button>
      <button class="save" id="btn-save">保存</button>
    </div>
  </div>
<script>
(function(){
  var k=0,t=null,icp=document.getElementById('icp-link'),inp=document.getElementById('icp-input'),
      panel=document.getElementById('edit-panel'),ov=document.getElementById('overlay'),
      title=document.getElementById('site-title'),btnSave=document.getElementById('btn-save');
  title.addEventListener('click',function(){k++;clearTimeout(t);t=setTimeout(function(){k=0;},800);if(k>=5){k=0;openPanel();}});
  function openPanel(){inp.value=icp.textContent;panel.style.display='block';ov.style.display='block';inp.focus();}
  function closePanel(){panel.style.display='none';ov.style.display='none';btnSave.disabled=false;btnSave.textContent='保存';}
  document.getElementById('btn-cancel').onclick=closePanel;
  ov.onclick=closePanel;
  btnSave.onclick=function(){
    var v=inp.value.trim();if(!v)return;
    btnSave.disabled=true;btnSave.textContent='保存中...';
    fetch('/api/icp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({icp:v})})
    .then(function(r){return r.json();})
    .then(function(d){if(d.ok){icp.textContent=v;closePanel();}else{btnSave.disabled=false;btnSave.textContent='保存';}})
    .catch(function(){btnSave.disabled=false;btnSave.textContent='保存';});
  };
})();
</script>
</body>
</html>
